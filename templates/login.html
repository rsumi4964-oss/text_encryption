{% extends "base.html" %}
{% block title %}Sign In — SecureVault{% endblock %}

{% block content %}
<div class="page">
  <div class="card animate-fade-up">
    <div class="card-header">
      <div class="card-icon">🔓</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your SecureVault account</p>
    </div>

    {% if error %}
    <div class="alert alert-error" id="login-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" id="login-form">
      <div class="form-group animate-fade-up delay-1">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="form-group animate-fade-up delay-2">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <div class="animate-fade-up delay-3">
        <button type="submit" class="btn btn-primary" id="login-submit">
          🔓 Sign In
        </button>
      </div>
    </form>

    <div class="auth-footer animate-fade-up delay-4">
      Don't have an account? <a href="/register">Create one →</a>
    </div>
  </div>
</div>
{% endblock %}
