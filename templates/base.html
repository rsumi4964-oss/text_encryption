<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecureVault — Military-grade RSA-2048 text encryption system with user authentication and encryption history.">
  <title>{% block title %}SecureVault{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body>

{% if session.user %}
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand">
    <div class="brand-icon">🔐</div>
    SecureVault
  </a>
  <ul class="navbar-links">
    <li><a href="/dashboard">Dashboard</a></li>
    <li><a href="/encrypt">Encrypt</a></li>
    <li><a href="/decrypt">Decrypt</a></li>
    <li><a href="/report">Report</a></li>
  </ul>
  <div class="navbar-user">
    <div class="user-badge">
      <div class="user-avatar">{{ session.user[0].upper() }}</div>
      {{ session.user }}
    </div>
    <a href="/logout" class="btn btn-secondary btn-sm">Logout</a>
  </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

<footer class="footer">
  SecureVault &copy; 2025 — Built with <span>♥</span> &amp; RSA-2048 Encryption
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
