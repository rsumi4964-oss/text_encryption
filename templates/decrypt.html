<!DOCTYPE html>
<html>
<head>
    <title>Decrypt</title>
</head>
<body>

<h2>Decrypt Text</h2>

<form method="POST">
    <input type="text" name="text" placeholder="Enter encrypted text" required><br><br>
    <button type="submit">Decrypt</button>
</form>

{% if result %}
    <h3>Decrypted Text:</h3>
    <p>{{ result }}</p>
{% endif %}

<br>
<a href="/dashboard">Back</a>

</body>
</html>
