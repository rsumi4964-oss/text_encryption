{% extends "base.html" %}
{% block title %}Create Account — SecureVault{% endblock %}

{% block content %}
<div class="page">
  <div class="card animate-fade-up">
    <div class="card-header">
      <div class="card-icon">🛡️</div>
      <h1>Create Account</h1>
      <p>Join SecureVault and start encrypting</p>
    </div>

    {% if error %}
    <div class="alert alert-error" id="register-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" id="register-form">
      <div class="form-group animate-fade-up delay-1">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Choose a username" required autocomplete="username"
               minlength="3">
      </div>
      <div class="form-group animate-fade-up delay-2">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Create a strong password" required autocomplete="new-password"
               minlength="6">
      </div>
      <div class="animate-fade-up delay-3">
        <button type="submit" class="btn btn-primary" id="register-submit">
          🛡️ Create Account
        </button>
      </div>
    </form>

    <div class="auth-footer animate-fade-up delay-4">
      Already have an account? <a href="/login">Sign in →</a>
    </div>
  </div>
</div>
{% endblock %}
