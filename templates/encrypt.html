<!DOCTYPE html>
<html>
<head>
    <title>Encrypt</title>
</head>
<body>

<h2>Encrypt Text</h2>

<form method="POST">
    <input type="text" name="text" placeholder="Enter text" required><br><br>
    <button type="submit">Encrypt</button>
</form>

{% if result %}

    <p>{{ result }}</p>
{% endif %}

<br>
<a href="/dashboard">Back</a>

</body>
</html>
